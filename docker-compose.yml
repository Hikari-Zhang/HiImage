version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hiimage-backend
    ports:
      - "${BACKEND_PORT:-8787}:8787"
    volumes:
      # 持久化模型（避免每次重新下载）
      - ./models:/app/models
      # 配置文件
      - ./config:/app/config
      # 临时文件
      - ./tmp:/app/tmp
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/models/huggingface
      - TORCH_HOME=/app/models/torch
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

