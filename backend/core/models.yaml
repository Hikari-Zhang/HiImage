# ==============================================================================
# HiImage —— 统一模型与模式注册表
#
# 所有功能（换背景/换装/去水印/超分辨率/……）的模型配置均在此文件维护。
# Python 代码通过 core/model_registry.py 读取本文件，不再硬编码任何模型信息。
#
# 字段说明
# --------
# id              内部 ID，与前端 model_id / 后端 dispatch 一一对应
# name            展示名称
# provider        模型来源：
#                   rembg       → rembg 库管理，权重在 ~/.u2net/
#                   IOPaint     → iopaint 本地模型（lama/migan 等），首次使用自动下载权重
#                   diffusers   → HuggingFace diffusers 管道，权重在 HF 缓存
#                   HiImage     → 本项目自定义管道（组合多个子模型）
#                   facexlib    → GFPGAN/facexlib，权重在 models/gfpgan/
#                   realesrgan  → Real-ESRGAN，权重在 models/realesrgan/
# tags            所属功能模式 ID 列表（一个模型可属于多个模式）
# description     面向用户的功能描述
# recommended_for 适合的场景（用于 UI tooltip）
# requires_reference 是否需要参考图
# size_mb         模型权重大小（MB，估算）
# badge           UI 徽章：推荐 / 快速 / 高质量 / 动漫（空串表示无徽章）
# hf_model_id     HuggingFace Hub model ID（单模型），可直接传给 snapshot_download()
#                   与 hf_models 互斥，优先使用 hf_models
# hf_models       HuggingFace Hub 多模型列表（组合模型专用，如 GDINO+SAM+FLUX）
#                   每项字段：
#                     id       str  — HuggingFace Hub repo ID（必填）
#                     name     str  — 子模型显示名称（必填，用于日志/进度）
#                     size_mb  int  — 子模型权重大小（MB，估算，用于完整性检测）
#                   完整性检测和下载均按列表顺序逐个处理，status 取最差状态
#                   外层 size_mb 保持全部子模型总和（用于前端展示）
# download_url    模型下载页面 URL（HuggingFace 或 GitHub Release）
# local_path      相对于 PROJECT_ROOT 的本地权重路径
#                   用于 GFPGAN / Real-ESRGAN 等以文件系统路径存储的模型
# rembg_model_name  rembg 库内部模型名，对应 ~/.u2net/<name>.onnx
#
# ── IOPaint 专用字段（provider: IOPaint）────────────────────────────────────
# iopaint_model_id  传给 iopaint CLI / server 的 --model 参数：
#                   快速本地模型（lama/migan 等）直接用单词；
#                   扩散模型用 HuggingFace org/repo 格式
# iopaint_mode    IOPaint 调用方式：
#                   "cli"    → iopaint run 命令（快速本地模型，首次使用时自动从 GitHub
#                              Releases 下载权重到 ~/.cache/torch/hub/checkpoints/）
#                   "server" → iopaint start HTTP 服务（扩散模型，首次自动下载到 HF 缓存）
# device_override 强制使用的推理设备，忽略用户在 UI 中的选择。
#                   用于处理某些模型不兼容特定设备的情况，例如：
#                   AnyText 的 LDM/DDIM pipeline 使用了 MPS 不支持的操作，
#                   必须强制回退到 cpu，否则 iopaint server 在推理时返回 HTTP 500。
#                   不设置此字段（或设为 null）则尊重用户选择的设备。
# display_group   在 UI 下拉中所属的分组标题（watermark_removal 模式专用）
#
# ── Real-ESRGAN 专用字段（provider: realesrgan）──────────────────────────────
# scale           超分倍率（2 或 4）
# weight_filename 权重文件名，完整路径为 models/realesrgan/<weight_filename>
# arch            网络架构：RRDBNet（标准大模型）或 SRVGGNetCompact（轻量模型）
# num_block       RRDBNet 专用：dense block 数（23 = 标准；6 = anime 小模型）
# num_conv        SRVGGNetCompact 专用：conv 层数（32 = general-x4v3；16 = animevideo）
# outscale        实际输出倍率（可选）：不设则等于 scale；设为 1 表示同分辨率清晰化增强
#
# supported_params 推理参数说明（key → type/default/range?/desc）
# features        能力标签列表：
#                   matting / inpaint_region / inpaint_prompt / segmentation /
#                   pure_color / texture / style / instruction / face_enhance /
#                   upscale
#
# 新增模型只需在 models 列表末尾追加一条记录，无需修改任何 Python 代码。
# ==============================================================================


# ── 参数规格模板（锚点，供各模型引用以避免重复）─────────────────────────────

_templates:

  # SD 1.5 Inpainting 参数
  sd_inpaint: &sd_inpaint
    num_inference_steps:
      type: int
      default: 50
      range: [1, 150]
      desc: 扩散去噪步数；步数越多越精细，但耗时增加
    guidance_scale:
      type: float
      default: 7.5
      range: [1.0, 20.0]
      desc: 提示词引导强度；值越高越贴近 prompt，但可能过拟合
    seed:
      type: int
      default: 42
      range: [0, 2147483647]
      desc: 随机种子；相同种子可复现结果
    prompt:
      type: str
      default: ""
      desc: 正向提示词（英文效果更佳）
    negative_prompt:
      type: str
      default: "blurry, low quality, deformed"
      desc: 负向提示词，描述不希望出现的内容

  # SDXL Inpainting 参数（与 SD 1.5 相同，但推荐步数不同）
  sdxl_inpaint: &sdxl_inpaint
    <<: *sd_inpaint
    num_inference_steps:
      type: int
      default: 40
      range: [1, 100]
      desc: SDXL 推荐 30-50 步，兼顾质量与速度

  # FLUX.1 参数
  flux: &flux
    num_inference_steps:
      type: int
      default: 28
      range: [1, 50]
      desc: FLUX 推荐 20-30 步（flow-matching，步数不宜过多）
    guidance_scale:
      type: float
      default: 3.5
      range: [1.0, 10.0]
      desc: FLUX guidance；通常 3-5 即可，过高会过饱和
    seed:
      type: int
      default: 42
      range: [0, 2147483647]
      desc: 随机种子
    prompt:
      type: str
      default: ""
      desc: 正向提示词

  # InstructPix2Pix 参数
  ip2p: &ip2p
    num_inference_steps:
      type: int
      default: 50
      range: [1, 150]
      desc: 去噪步数
    image_guidance_scale:
      type: float
      default: 1.5
      range: [1.0, 5.0]
      desc: 原图保留程度；越高越接近原图，越低创意越强
    guidance_scale:
      type: float
      default: 7.5
      range: [1.0, 20.0]
      desc: 指令引导强度
    seed:
      type: int
      default: 42
      range: [0, 2147483647]
      desc: 随机种子
    prompt:
      type: str
      default: ""
      desc: 编辑指令（支持中英文）

  # GFPGAN 参数
  gfpgan: &gfpgan
    upscale:
      type: int
      default: 1
      range: [1, 4]
      desc: 超分倍率；1 = 不超分，仅增强细节

  # HSV 换色参数
  hsv: &hsv
    feather_px:
      type: int
      default: 5
      range: [0, 30]
      desc: 边缘羽化像素数，避免换色边界生硬
    saturation_boost:
      type: float
      default: 1.0
      range: [0.2, 3.0]
      desc: 目标颜色饱和度增益

  # 编辑指令提示词（追加到其他模板之上）
  edit_prompt: &edit_prompt
    prompt:
      type: str
      default: ""
      desc: 编辑指令，例：将上衣换成黑色 / 把裤子改成牛仔风格


